<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emociona 5D — Clientas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #FDF8F4;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: white;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand-logo { height: 46px; max-width: 160px; object-fit: contain; display: block; }
    .header-user { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #E8C8E3; object-fit: cover; }
    .user-name { font-size: 13px; color: #7A8A8E; }
    .logout-btn { font-size: 12px; color: #9BB5BC; background: none; border: 1px solid #D8E8EB; border-radius: 6px; padding: 4px 12px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .logout-btn:hover { background: #F9EEF7; color: #A7228C; }

    /* ── NAV ── */
    nav { background: white; border-bottom: 1px solid #EEF2F4; padding: 0 28px; display: flex; }
    .nav-tab { padding: 12px 20px; font-size: 13px; color: #9BB5BC; border-bottom: 2px solid transparent; transition: all 0.2s; text-decoration: none; display: block; }
    .nav-tab.active { color: #A7228C; border-bottom-color: #A7228C; font-weight: 500; }
    .nav-tab.disabled { opacity: 0.4; pointer-events: none; }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
      height: calc(100vh - 101px);
    }

    /* ── PANEL IZQUIERDO ── */
    .panel-lista {
      background: white;
      border-right: 1px solid #EEF2F4;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .lista-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid #F0F4F5;
    }
    .lista-header h2 { font-size: 15px; font-weight: 500; color: #A7228C; margin-bottom: 12px; }

    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1.5px solid #E0E8EA;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #3C4A50;
      outline: none;
      transition: border-color 0.2s;
      background: #FAFCFD;
    }
    .search-box input:focus { border-color: #5BAA96; background: white; }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #B0C4C8;
      font-size: 14px;
      pointer-events: none;
    }

    .lista-count { font-size: 11px; color: #9BB5BC; padding: 8px 20px 0; }

    .lista-scroll { overflow-y: auto; flex: 1; }

    .cliente-item {
      padding: 14px 20px;
      border-bottom: 1px solid #F5F8F9;
      cursor: pointer;
      transition: background 0.15s;
    }
    .cliente-item:hover { background: #F5FAFA; }
    .cliente-item.activo { background: #EDF8F6; border-left: 3px solid #5BAA96; padding-left: 17px; }

    .cliente-nombre { font-size: 14px; font-weight: 500; color: #2C3E40; }
    .cliente-meta { font-size: 12px; color: #9BB5BC; margin-top: 3px; display: flex; gap: 10px; }

    .badge-sesiones {
      background: #E8F5F2;
      color: #2C7A68;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 8px;
      font-weight: 600;
    }

    /* ── PANEL DERECHO ── */
    .panel-ficha {
      overflow-y: auto;
      padding: 28px 32px;
    }

    .ficha-vacia {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #B0C4C8;
      text-align: center;
    }
    .ficha-vacia .icono { font-size: 40px; margin-bottom: 14px; }
    .ficha-vacia p { font-size: 14px; }

    /* ── FICHA ── */
    .ficha-nombre {
      font-size: 24px;
      font-weight: 300;
      color: #A7228C;
      margin-bottom: 4px;
    }
    .ficha-sub { font-size: 13px; color: #9BB5BC; margin-bottom: 24px; }

    .seccion {
      background: white;
      border-radius: 14px;
      padding: 22px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 18px;
    }
    .seccion-titulo {
      font-size: 11px;
      font-weight: 600;
      color: #9BB5BC;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    /* ── GRID DATOS ── */
    .datos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .datos-grid .ancho-completo { grid-column: 1 / -1; }

    .dato-grupo { display: flex; flex-direction: column; gap: 4px; }
    .dato-label { font-size: 12px; color: #6A7A80; text-transform: uppercase; letter-spacing: 0.8px; }

    .dato-input {
      font-family: inherit;
      font-size: 15px;
      padding: 9px 11px;
      border: 1.5px solid #E0E8EA;
      border-radius: 8px;
      color: #3C4A50;
      background: white;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .dato-input:focus { border-color: #5BAA96; }
    .dato-input[readonly] {
      background: #FAFCFD;
      color: #7A8A8E;
      cursor: default;
    }
    .dato-input.guardado { border-color: #5BAA96; background: #F0FAF7; }

    /* ── ACCIONES CONTACTO ── */
    .dato-con-acciones { display: flex; gap: 6px; align-items: center; }
    .dato-con-acciones .dato-input { flex: 1; min-width: 0; }
    .btn-contacto {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border: 1.5px solid #E0E8EA;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      color: inherit;
    }
    .btn-contacto:hover { background: #F0F4F5; border-color: #B0C8CE; }
    .btn-contacto.wa:hover { background: #E8F8EE; border-color: #25D366; }
    .btn-contacto.gmail:hover { background: #FEF0F0; border-color: #EA4335; }

    /* ── AUTORIZACIONES ── */
    .autorizaciones { display: flex; gap: 14px; flex-wrap: wrap; }
    .autorizacion-card {
      flex: 1;
      min-width: 180px;
      border: 1.5px solid #E0E8EA;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .autorizacion-card.positiva { border-color: #5BAA96; background: #F0FAF7; }
    .autorizacion-card.negativa { border-color: #E0E0E0; background: #FAFAFA; }
    .aut-label { font-size: 11px; color: #9BB5BC; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .aut-valor { font-size: 14px; font-weight: 500; color: #2C3E40; }
    .aut-valor.si { color: #2C7A68; }
    .aut-valor.no { color: #9BB5BC; }

    /* Selector publicar */
    .publicar-select {
      font-family: inherit;
      font-size: 13px;
      padding: 7px 10px;
      border: 1.5px solid #E0E8EA;
      border-radius: 8px;
      color: #3C4A50;
      background: white;
      outline: none;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: border-color 0.2s;
    }
    .publicar-select:focus { border-color: #5BAA96; }

    /* ── HISTORIAL ── */
    .historial-lista { display: flex; flex-direction: column; gap: 8px; }

    .historial-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #FAFCFD;
      border-radius: 8px;
      border: 1px solid #F0F4F5;
    }
    .historial-fecha { font-size: 12px; color: #9BB5BC; white-space: nowrap; width: 80px; }
    .historial-servicio { flex: 1; }
    .historial-importe { font-size: 13px; font-weight: 500; color: #4A6A54; white-space: nowrap; }
    .historial-cobrado { font-size: 11px; color: #9BB5BC; white-space: nowrap; }

    .servicio-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 500; }

    .btn-guardar-datos {
      margin-top: 16px;
      padding: 10px 22px;
      background: #A7228C;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-guardar-datos:hover { background: #234E5C; }
    .btn-guardar-datos:disabled { opacity: 0.5; cursor: wait; }

    .guardar-ok {
      display: inline-block;
      margin-left: 10px;
      font-size: 12px;
      color: #5BAA96;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .guardar-ok.visible { opacity: 1; }

    .loading-msg { text-align: center; padding: 40px; color: #9BB5BC; font-size: 14px; }
    .error-msg { background: #FFF8F8; border: 1px solid #F5C6C6; border-radius: 10px; padding: 16px; color: #C0392B; font-size: 13px; }

    /* ── BOTÓN VOLVER (móvil) ── */
    .btn-volver-movil {
      display: none; align-items: center; gap: 6px;
      font-size: 13px; color: #A7228C; background: none; border: none;
      cursor: pointer; font-family: inherit; padding: 0 0 16px; font-weight: 500;
    }

    /* ── RESPONSIVE MÓVIL ── */
    @media (max-width: 768px) {
      nav { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 8px; }
      .nav-tab { padding: 12px 12px; font-size: 12px; white-space: nowrap; }
      .layout { grid-template-columns: 1fr; height: auto; }
      .panel-lista { height: calc(100vh - 101px); }
      .panel-lista.mob-oculto { display: none; }
      .panel-ficha { min-height: calc(100vh - 101px); padding: 20px 16px; }
      .panel-ficha.mob-oculto { display: none; }
      .btn-volver-movil { display: flex; }
      .datos-grid { grid-template-columns: 1fr; }
      .dato-label { font-size: 13px; }
      .dato-input { font-size: 16px; padding: 11px 12px; }
      .ficha-nombre { font-size: 26px; }
      .cliente-nombre { font-size: 15px; }
    }
  </style>

  <link rel="icon" href="silueta.jpg">
  <meta name="theme-color" content="#A7228C">

</head>
<body>

<header>
  <img class="brand-logo" src="logo-secundario.jpg" alt="Emociona 5D">
  <div class="header-user">
    <img class="user-avatar" id="user-avatar" src="" alt="" onerror="this.style.display='none'">
    <span class="user-name" id="user-name"></span>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<nav>
  <a class="nav-tab" href="dashboard.html">Hoy</a>
  <a class="nav-tab" href="agenda.html">Agenda</a>
  <a class="nav-tab" href="sesiones.html">Sesiones</a>

<div class="layout">

  <!-- LISTA -->
  <div class="panel-lista" id="panel-lista">
    <div class="lista-header">
      <h2>Clientas</h2>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="search" id="busqueda" placeholder="Nombre, teléfono o DNI..." oninput="filtrarLista()">
      </div>
    </div>
    <div class="lista-count" id="lista-count"></div>
    <div class="lista-scroll" id="lista-scroll">
      <div class="loading-msg">Cargando clientas...</div>
    </div>
  </div>

  <!-- FICHA -->
  <div class="panel-ficha mob-oculto" id="panel-ficha">
    <button class="btn-volver-movil" onclick="volverALista()">← Volver</button>
    <div class="ficha-vacia">
      <div class="icono">🌸</div>
      <p>Selecciona una clienta<br>para ver su ficha</p>
    </div>
  </div>

</div>

<script>
  const SHEET_ID   = '1Zb5yWR1oQF03jU8JNDDr4ynChC66WEObkDwnvYLOkpM';
  const SHEET_NAME = 'Respuestas de formulario 2026';
  const CLIENT_ID  = '439474376295-jjs3q4nki5pkpc9fc9qfcdmp4ldlj1vh.apps.googleusercontent.com';
  const SCOPES     = 'openid email profile https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly';
  const ENCARGOS_FOLDER_ID = '1Cz3KxAlCyKYMk4FdMyFn3MtOQ5MQ13uh'; // carpeta Drive "Encargos" (collage)

  const COLORES = {
    'ecoconfirmación':  { bg: '#F0F0F0', color: '#555' },
    'ecosexo emociona': { bg: '#E8F2E5', color: '#4A7A3A' },
    'ecosexo':          { bg: '#FDECEA', color: '#C0392B' },
    'ecobasic plus':    { bg: '#FFF8E1', color: '#B8860B' },
    'ecobasic':         { bg: '#FFF0E5', color: '#D2691E' },
    'ecoemociona':      { bg: '#E0F4F2', color: '#1A7A70' }
  };

  // ── SESIÓN ──
  const sesionData = sessionStorage.getItem('emociona_session');
  if (!sesionData) { window.location.href = 'index.html'; }
  const sesion = JSON.parse(sesionData || '{}');
  if (!sesion.access_token || Date.now() > sesion.token_expiry) {
    sessionStorage.removeItem('emociona_session');
    window.location.href = 'index.html';
  }
  if (sesion.picture) document.getElementById('user-avatar').src = sesion.picture;
  document.getElementById('user-name').textContent = sesion.name || sesion.email;

  const esOwner = sesion.role === 'owner';

  let clientasMap = {}; // clave: telefono o nombre → { datos, sesiones[] }
  let clientasOrdenadas = []; // array de claves ordenado
  let clientaActivaKey = null;
  let nombreClientaActiva = null; // nombre completo de la clienta abierta, para buscar su carpeta de Encargos

  // ── CARGAR ──
  async function cargar() {
    try {
      const range = encodeURIComponent(`'${SHEET_NAME}'!A:Y`);
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}`;
      const resp = await fetch(url, { headers: { Authorization: 'Bearer ' + sesion.access_token } });
      if (!resp.ok) throw new Error('Error ' + resp.status);

      const data = await resp.json();
      const filas = (data.values || []).slice(1).filter(f => f[0]);

      // Agrupar por teléfono (Q = idx 16); si no hay, por nombre+apellido
      clientasMap = {};
      filas.forEach((fila, idx) => {
        const tel    = (fila[16] || '').trim();
        const nombre = ((fila[0]||'') + ' ' + (fila[1]||'')).trim();
        const clave  = tel || nombre;
        if (!clave) return;

        if (!clientasMap[clave]) {
          clientasMap[clave] = { sesiones: [], datosFila: null, datosSheetRow: null };
        }
        clientasMap[clave].sesiones.push({ fila, sheetRow: idx + 2 });
      });

      // Para cada clienta, usar la sesión más reciente como datos de referencia
      Object.keys(clientasMap).forEach(clave => {
        const c = clientasMap[clave];
        c.sesiones.sort((a, b) => parseFecha(b.fila[3]) - parseFecha(a.fila[3]));
        c.datosFila    = c.sesiones[0].fila;
        c.datosSheetRow = c.sesiones[0].sheetRow;
      });

      // Ordenar alfabéticamente por nombre
      clientasOrdenadas = Object.keys(clientasMap).sort((a, b) => {
        const na = ((clientasMap[a].datosFila[0]||'') + ' ' + (clientasMap[a].datosFila[1]||'')).toLowerCase();
        const nb = ((clientasMap[b].datosFila[0]||'') + ' ' + (clientasMap[b].datosFila[1]||'')).toLowerCase();
        return na.localeCompare(nb, 'es');
      });

      renderLista(clientasOrdenadas);

      // Auto-seleccionar clienta si viene ?buscar= en la URL
      const urlParam = new URLSearchParams(window.location.search).get('buscar');
      if (urlParam) {
        // Buscar por teléfono exacto primero, luego por nombre completo
        let clave = clientasOrdenadas.find(k => k === urlParam);
        if (!clave) {
          clave = clientasOrdenadas.find(k => {
            const f = clientasMap[k].datosFila;
            return ((f[0]||'') + ' ' + (f[1]||'')).trim().toLowerCase() === urlParam.toLowerCase();
          });
        }
        if (clave) {
          // Rellenar búsqueda y mostrar solo esa clienta
          document.getElementById('busqueda').value = urlParam;
          filtrarLista();
          // Esperar a que el DOM se actualice y abrir la ficha
          setTimeout(() => {
            const el = document.querySelector(`.cliente-item[data-clave="${CSS.escape(clave)}"]`);
            abrirFicha(clave, el || null);
          }, 50);
        }
      }

    } catch(e) {
      document.getElementById('lista-scroll').innerHTML = `<div class="error-msg">Error al cargar: ${e.message}</div>`;
    }
  }

  // Convierte número español a formato WhatsApp (+34...)
  function waNum(tel) {
    const digits = tel.replace(/\D/g, '');
    if (digits.startsWith('34')) return digits;
    if (digits.startsWith('6') || digits.startsWith('7') || digits.startsWith('9')) return '34' + digits;
    return digits;
  }

  function parseFecha(str) {
    if (!str) return 0;
    const p = str.trim().split('/');
    if (p.length !== 3) return 0;
    return new Date(p[2], p[1]-1, p[0]).getTime();
  }

  // ── LISTA ──
  function renderLista(claves) {
    const scroll = document.getElementById('lista-scroll');
    document.getElementById('lista-count').textContent = claves.length + ' clientas';

    if (claves.length === 0) {
      scroll.innerHTML = '<div class="loading-msg">Sin resultados</div>';
      return;
    }

    scroll.innerHTML = '';
    claves.forEach(clave => {
      const c = clientasMap[clave];
      const f = c.datosFila;
      const nombre   = ((f[0]||'') + ' ' + (f[1]||'')).trim();
      const tel      = (f[16]||'').trim();
      const nSesiones = c.sesiones.length;

      const div = document.createElement('div');
      div.className = 'cliente-item' + (clave === clientaActivaKey ? ' activo' : '');
      div.innerHTML = `
        <div class="cliente-nombre">${nombre}</div>
        <div class="cliente-meta">
          ${tel ? `<span>📞 ${tel}</span>` : ''}
          <span class="badge-sesiones">${nSesiones} sesión${nSesiones !== 1 ? 'es' : ''}</span>
        </div>`;
      div.dataset.clave = clave;
      div.onclick = () => abrirFicha(clave, div);
      scroll.appendChild(div);
    });
  }

  function filtrarLista() {
    const q = document.getElementById('busqueda').value.toLowerCase().trim();
    if (!q) { renderLista(clientasOrdenadas); return; }
    const filtradas = clientasOrdenadas.filter(clave => {
      const f = clientasMap[clave].datosFila;
      const nombre = ((f[0]||'') + ' ' + (f[1]||'')).toLowerCase();
      const tel    = (f[16]||'').toLowerCase();
      const dni    = (f[2]||'').toLowerCase();
      return nombre.includes(q) || tel.includes(q) || dni.includes(q);
    });
    renderLista(filtradas);
  }

  // ── FICHA ──
  function abrirFicha(clave, itemEl) {
    // Marcar activo en lista
    document.querySelectorAll('.cliente-item').forEach(el => el.classList.remove('activo'));
    if (itemEl) itemEl.classList.add('activo');
    clientaActivaKey = clave;

    // Móvil: mostrar ficha, ocultar lista
    if (window.innerWidth <= 768) {
      document.getElementById('panel-lista').classList.add('mob-oculto');
      document.getElementById('panel-ficha').classList.remove('mob-oculto');
      document.getElementById('panel-ficha').scrollTop = 0;
    }

    const c = clientasMap[clave];
    const f = c.datosFila;
    const row = c.datosSheetRow;

    const nombre   = ((f[0]||'') + ' ' + (f[1]||'')).trim();
    const apellidos = (f[1]||'').trim();
    const dni      = (f[2]||'').trim();
    const tel      = (f[16]||'').trim();
    const email    = (f[17]||'').trim();
    const dir      = (f[20]||'').trim();
    const muni     = (f[21]||'').trim();
    const cp       = (f[22]||'').trim();
    const autRedes = (f[14]||'').trim();
    const publicar = (f[15]||'').trim();

    const autSi = autRedes.toLowerCase() === 'sí' || autRedes.toLowerCase() === 'si' || autRedes === '1' || autRedes.toLowerCase() === 'true';

    nombreClientaActiva = nombre;

    const panel = document.getElementById('panel-ficha');
    panel.innerHTML = `
      <div class="ficha-nombre">${nombre}</div>
      <div class="ficha-sub">${c.sesiones.length} sesión${c.sesiones.length !== 1 ? 'es' : ''} · Datos de la sesión más reciente</div>

      <!-- FOTOS COLLAGE -->
      <div class="seccion">
        <div class="seccion-titulo">Fotos de collage (Encargos)</div>
        <button class="btn-guardar-datos" id="btn-imprimir-fotos" onclick="imprimirFotosCollage()">🖨️ Imprimir fotos (8K / 5D / collage)</button>
        <button class="btn-guardar-datos" id="btn-compartir-fotos" onclick="compartirFotosCollage()" style="display:none; margin-left:8px; background:#5BAA96;">📲 Compartir con Canon PRINT</button>

  // ── RENOVACIÓN AUTOMÁTICA DE TOKEN ──
  let _tokenClient = null;

  function getTokenClient() {
    if (!_tokenClient) {
      _tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        prompt: '',
        callback: () => {}
      });
    }
    return _tokenClient;
  }

  function renovarToken() {
    return new Promise((resolve, reject) => {
      try {
        const client = getTokenClient();
        client.callback = (tokenResponse) => {
          if (tokenResponse.error) { reject(new Error(tokenResponse.error)); return; }
          sesion.access_token = tokenResponse.access_token;
          sesion.token_expiry = Date.now() + (tokenResponse.expires_in * 1000);
          sessionStorage.setItem('emociona_session', JSON.stringify(sesion));
          resolve();
        };
        client.requestAccessToken();
      } catch(e) { reject(e); }
    });
  }

  async function renovarTokenSiNecesario() {
    if (Date.now() > sesion.token_expiry - 5 * 60 * 1000) {
      await renovarToken();
    }
  }

  // ── API ──
  async function actualizarCelda(col, row, valor) {
    await renovarTokenSiNecesario();
    const range = encodeURIComponent(`'${SHEET_NAME}'!${col}${row}`);
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`;
    let resp = await fetch(url, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + sesion.access_token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [[valor]] })
    });
    if (resp.status === 401) {
      await renovarToken();
      resp = await fetch(url, {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + sesion.access_token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[valor]] })
      });
    }
    if (!resp.ok) throw new Error('Error ' + resp.status);
  }

  // ── IMPRIMIR FOTOS DE COLLAGE (carpeta Drive "Encargos") ──

  function normalizarTexto(s) {
    return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
  }

  async function listarCarpetasEncargos() {
    const q = encodeURIComponent(`'${ENCARGOS_FOLDER_ID}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=1000`;
    const resp = await fetch(url, { headers: { Authorization: 'Bearer ' + sesion.access_token } });
    if (!resp.ok) throw new Error('Error ' + resp.status);
    const data = await resp.json();
    return data.files || [];
  }

  async function listarSubcarpetas(folderId) {
    const q = encodeURIComponent(`'${folderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=100`;
    const resp = await fetch(url, { headers: { Authorization: 'Bearer ' + sesion.access_token } });
    if (!resp.ok) throw new Error('Error ' + resp.status);
    const data = await resp.json();
    return data.files || [];
  }

  // Dentro de cada carpeta de encargo hay una subcarpeta "productos" con las fotos entregables
  async function buscarSubcarpetaProductos(carpetaOrdenId) {
    const subcarpetas = await listarSubcarpetas(carpetaOrdenId);
    return subcarpetas.find(c => normalizarTexto(c.name) === 'productos') || null;
  }

  async function listarImagenesEnCarpeta(folderId) {
    const q = encodeURIComponent(`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`);
    const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,mimeType)&pageSize=1000&orderBy=name`;
    const resp = await fetch(url, { headers: { Authorization: 'Bearer ' + sesion.access_token } });
    if (!resp.ok) throw new Error('Error ' + resp.status);
    const data = await resp.json();
    return data.files || [];
  }

  // Solo se imprimen los archivos entregables: foto8K_..., foto5D_..., collage_... (se excluyen vídeos y otros)
  function esFotoImprimible(nombreArchivo) {
    return /^(foto8k|foto5d|collage)_/i.test(nombreArchivo || '');
  }

  async function descargarImagenBlobUrl(fileId) {
    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
    const resp = await fetch(url, { headers: { Authorization: 'Bearer ' + sesion.access_token } });
    if (!resp.ok) throw new Error('Error ' + resp.status);
    const blob = await resp.blob();
    return URL.createObjectURL(blob);
  }

  // Busca en Drive las fotos imprimibles (foto8K_/foto5D_/collage_) del encargo de la clienta activa.
  // Lanza un Error con un mensaje ya listo para mostrar si no encuentra nada.
  async function buscarImagenesImprimibles(estado) {
    const carpetas = await listarCarpetasEncargos();
    const nombreNorm = normalizarTexto(nombreClientaActiva);

    const coincidencias = carpetas.filter(c => {
      const primeraParte = normalizarTexto((c.name || '').split('-')[0]);
      if (!primeraParte || primeraParte.length < 3) return false;
      return primeraParte.includes(nombreNorm) || nombreNorm.includes(primeraParte);
    });

    if (coincidencias.length === 0) {
      throw new Error('No se ha encontrado ningún encargo de collage pendiente para esta clienta en la carpeta Encargos. (Se borran automáticamente a los 10 días de creados)');
    }

    if (estado) estado.textContent = 'Encargo encontrado. Buscando carpeta "productos"...';
    let imagenes = [];
    let algunaCarpetaSinProductos = false;
    for (const carpeta of coincidencias) {
      const productos = await buscarSubcarpetaProductos(carpeta.id);
      if (!productos) { algunaCarpetaSinProductos = true; continue; }
      const archivos = await listarImagenesEnCarpeta(productos.id);
      imagenes.push(...archivos.filter(a => esFotoImprimible(a.name)));
    }

    if (imagenes.length === 0) {
      throw new Error(algunaCarpetaSinProductos
        ? 'Se encontró el encargo pero no tiene carpeta "productos" con fotos todavía.'
        : 'Se encontró la carpeta "productos" pero no contiene fotos con formato foto8K_, foto5D_ o collage_.');
    }

    return { imagenes, carpetas: coincidencias };
  }

  // El nombre de la carpeta de encargo es [NOMBRE]-[YYYYMMDD###]-[UUID]. Extrae la fecha en formato dd/mm/aaaa
  // (mismo formato que la columna "Fecha de la cita") para poder emparejarla con la sesión correcta.
  function extraerFechaDeCarpeta(nombreCarpeta) {
    const partes = (nombreCarpeta || '').split('-');
    if (partes.length < 2) return null;
    const codigo = partes[1].replace('[', '').replace(']', '').trim();
    if (!/^\d{8}/.test(codigo)) return null;
    const anio = codigo.substring(0, 4);
    const mes = codigo.substring(4, 6);
    const dia = codigo.substring(6, 8);
    return `${dia}/${mes}/${anio}`;
  }

  // Marca la columna "Carta" (J) con la fecha de hoy en la fila de la sesión correspondiente.
  // Si la fecha de la carpeta del encargo coincide con la fecha de una sesión concreta de la clienta,
  // marca esa fila; si no encuentra coincidencia exacta, marca la sesión más reciente (comportamiento anterior).
  // Los errores aquí no deben impedir que la foto se haya impreso/compartido, así que se ignoran en silencio.
  async function marcarCartaEnviada(carpetas) {
    try {
      const c = clientasMap[clientaActivaKey];
      if (!c) return;

      const hoy = new Date();
      const hoyStr = `${String(hoy.getDate()).padStart(2, '0')}/${String(hoy.getMonth() + 1).padStart(2, '0')}/${hoy.getFullYear()}`;

      const filas = new Set();
      carpetas.forEach(carpeta => {
        const fechaCarpeta = extraerFechaDeCarpeta(carpeta.name);
        const sesion = fechaCarpeta ? c.sesiones.find(s => (s.fila[3] || '').trim() === fechaCarpeta) : null;
        filas.add(sesion ? sesion.sheetRow : c.datosSheetRow);
      });

      for (const row of filas) {
        await actualizarCelda('J', row, hoyStr);
      }
    } catch (e) { /* no bloquear la impresión por un fallo aquí */ }
  }

  async function imprimirFotosCollage() {
    if (!nombreClientaActiva) return;
    const estado = document.getElementById('estado-fotos');
    const btn = document.getElementById('btn-imprimir-fotos');
    btn.disabled = true;
    estado.textContent = 'Buscando el encargo en Drive...';

    // En móvil hay que abrir la ventana YA, dentro del mismo clic, o el navegador la bloquea.
    // Se rellena más tarde, cuando las fotos estén listas.
    const ventana = window.open('', '_blank');
    if (ventana) {
      ventana.document.write('<!DOCTYPE html><html><head><title>Preparando fotos…</title></head><body style="font-family:sans-serif;padding:40px;text-align:center;color:#888;">Buscando y descargando las fotos…</body></html>');
      ventana.document.close();
    }

    try {
      if (!ventana || ventana.closed) {
        estado.textContent = 'El navegador ha bloqueado la ventana emergente. Permite las ventanas emergentes para esta web (suele salir un aviso arriba) e inténtalo de nuevo.';
        btn.disabled = false;
        return;
      }

      await renovarTokenSiNecesario();

      let imagenes, carpetas;
      try {
        ({ imagenes, carpetas } = await buscarImagenesImprimibles(estado));
      } catch (e) {
        ventana.close();
        estado.textContent = e.message;
        btn.disabled = false;
        return;
      }

      estado.textContent = `Descargando ${imagenes.length} foto${imagenes.length !== 1 ? 's' : ''}...`;
      const urls = [];
      for (const img of imagenes) {
        urls.push(await descargarImagenBlobUrl(img.id));
      }

      escribirVentanaImpresion(ventana, urls);
      await marcarCartaEnviada(carpetas);
      estado.textContent = `Listo: ${urls.length} foto${urls.length !== 1 ? 's' : ''} enviada${urls.length !== 1 ? 's' : ''} a la vista de impresión. Selecciona "Canon SELPHY CP1300" y tamaño Postal en el diálogo. ✓ Marcado en "Carta".`;
    } catch (e) {
      if (ventana && !ventana.closed) ventana.close();
      estado.textContent = 'Error al buscar o cargar las fotos: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  }

  async function descargarImagenFile(fileId, nombreArchivo, mimeType) {
    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
    const resp = await fetch(url, { headers: { Authorization: 'Bearer ' + sesion.access_token } });
    if (!resp.ok) throw new Error('Error ' + resp.status);
    const blob = await resp.blob();
    return new File([blob], nombreArchivo || 'foto.jpg', { type: mimeType || blob.type || 'image/jpeg' });
  }

  // Descarga las fotos y abre el panel nativo de "Compartir" del móvil (Canon PRINT, WhatsApp, etc.)
  async function compartirFotosCollage() {
    if (!nombreClientaActiva) return;
    const estado = document.getElementById('estado-fotos');
    const btn = document.getElementById('btn-compartir-fotos');
    btn.disabled = true;
    estado.textContent = 'Buscando el encargo en Drive...';

    try {
      await renovarTokenSiNecesario();
      const { imagenes, carpetas } = await buscarImagenesImprimibles(estado);

      estado.textContent = `Descargando ${imagenes.length} foto${imagenes.length !== 1 ? 's' : ''}...`;
      const files = [];
      for (const img of imagenes) {
        files.push(await descargarImagenFile(img.id, img.name, img.mimeType));
      }

      if (!navigator.canShare || !navigator.canShare({ files })) {
        throw new Error('Este dispositivo no admite compartir fotos directamente. Usa el botón "Imprimir fotos" en su lugar.');
      }

      await navigator.share({ files, title: 'Fotos ' + nombreClientaActiva });
      await marcarCartaEnviada(carpetas);
      estado.textContent = `Elige "Canon PRINT" (o la app que prefieras) en el panel para imprimir las ${files.length} foto${files.length !== 1 ? 's' : ''}. ✓ Marcado en "Carta".`;
    } catch (e) {
      estado.textContent = (e.name === 'AbortError') ? 'Cancelado.' : (e.message || 'Error al buscar, cargar o compartir las fotos.');
    } finally {
      btn.disabled = false;
    }
  }

  function escribirVentanaImpresion(ventana, urls) {
    const paginas = urls.map(u => `<div class="pagina"><img src="${u}"></div>`).join('');
    ventana.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <title>Imprimir fotos — Selphy CP1300</title>
        <style>
          @page { size: 100mm 148mm; margin: 0; }
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { background: #fff; }
          .pagina { width: 100mm; height: 148mm; padding: 4mm; page-break-after: always; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fff; }
          .pagina img { max-width: 100%; max-height: 100%; object-fit: contain; }
        </style>
      </head>
      <body>
        ${paginas}
        <script>
          window.onload = function () {
            setTimeout(function () { window.print(); }, 400);
          };
        <\/script>
      </body>
      </html>
    `);
    ventana.document.close();
  }

  function volverALista() {
    document.getElementById('panel-lista').classList.remove('mob-oculto');
    document.getElementById('panel-ficha').classList.add('mob-oculto');
  }

  function logout() {
    sessionStorage.removeItem('emociona_session');
    window.location.href = 'index.html';
  }

  cargar();
</script>
