<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emociona 5D — Acceso</title>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #FDF8F4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo-img {
      max-width: 220px;
      max-height: 120px;
      object-fit: contain;
      display: block;
      margin: 0 auto 4px;
    }

    .logo-subtitle {
      font-size: 11px;
      color: #9BB5BC;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #E8C8E3;
      margin: 28px auto;
      border-radius: 2px;
    }

    .welcome-text {
      font-size: 14px;
      color: #7A8A8E;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border: 1.5px solid #DADCE0;
      border-radius: 8px;
      background: white;
      color: #3C4043;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
    }

    .login-btn:hover {
      background: #F8F9FA;
      border-color: #C8D4D8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .error-msg {
      display: none;
      background: #FFF0F0;
      color: #C0392B;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      line-height: 1.5;
    }

    .loading-msg {
      display: none;
      color: #9BB5BC;
      font-size: 13px;
      margin-top: 16px;
    }

    .footer-text {
      margin-top: 36px;
      font-size: 11px;
      color: #C8D4D8;
      letter-spacing: 1px;
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="silueta.jpg">
  <meta name="theme-color" content="#A7228C">
</head>
<body>

<div class="login-card">
  <img class="logo-img" src="logo.jpg" alt="Emociona 5D">
  <div class="logo-subtitle">Gestión interna</div>
  <div class="divider"></div>
  <p class="welcome-text">Accede con tu cuenta de Google para continuar.</p>

  <button class="login-btn" id="login-btn" onclick="iniciarAcceso()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Iniciar sesión con Google
  </button>

  <div class="loading-msg" id="loading-msg">Conectando con Google...</div>
  <div class="error-msg" id="login-error"></div>
  <div class="footer-text">Solo para uso interno del equipo</div>
</div>

<script>
  const ROLES = {
    'emocionaecografia5d@gmail.com': 'owner',
    'danibarrasarodriguez@gmail.com': 'owner',
    'isabelzancadazarcero@gmail.com': 'owner'
    // Añadir email de Eli aquí con rol: 'staff'
  };

  const CLIENT_ID = '439474376295-jjs3q4nki5pkpc9fc9qfcdmp4ldlj1vh.apps.googleusercontent.com';

  // Si ya hay sesión válida, ir al dashboard
  const sesion = sessionStorage.getItem('emociona_session');
  if (sesion) {
    const s = JSON.parse(sesion);
    if (s.token_expiry && Date.now() < s.token_expiry) {
      window.location.href = 'dashboard.html';
    } else {
      sessionStorage.removeItem('emociona_session');
    }
  }

  let tokenClient;

  // Migraciones: borrar flags anteriores para forzar re-consentimiento con nuevos scopes
  localStorage.removeItem('emociona_gmail_ok');
  localStorage.removeItem('emociona_v2_ok');
  localStorage.removeItem('emociona_v3_ok');
  const SCOPE_KEY = 'emociona_v4_ok'; // v4: se añade drive.readonly para leer la carpeta Encargos (imprimir fotos collage)

  window.addEventListener('load', function () {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: 'openid email profile https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly',
      callback: handleTokenResponse
    });
  });

  function iniciarAcceso() {
    document.getElementById('login-btn').disabled = true;
    document.getElementById('loading-msg').style.display = 'block';
    document.getElementById('login-error').style.display = 'none';
    // Si ya concedió todos los permisos → login directo sin pantalla
    // Si no → pedir consentimiento (incluye el nuevo permiso de calendario)
    const allOk = localStorage.getItem(SCOPE_KEY) === '1';
    tokenClient.requestAccessToken(allOk ? {} : { prompt: 'consent' });
  }

  async function handleTokenResponse(response) {
    if (response.error) {
      mostrarError('No se pudo conectar con Google. Inténtalo de nuevo.');
      resetBtn();
      return;
    }

    try {
      const accessToken = response.access_token;

      // Confirmar si el token obtenido incluye gmail.send y actualizar el flag
      try {
        const ti = await fetch(`https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=${accessToken}`);
        const tiData = await ti.json();
        const scopes = tiData.scope || '';
        if (scopes.includes('gmail.send') && scopes.includes('calendar') && scopes.includes('drive.readonly')) {
          localStorage.setItem(SCOPE_KEY, '1');   // todos los permisos concedidos
        } else {
          localStorage.removeItem(SCOPE_KEY);     // faltan permisos: pedir en próximo login
        }
      } catch(e) {} // si falla el check, continuar igualmente

      // Obtener datos del usuario
      const userResp = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: 'Bearer ' + accessToken }
      });
      const userData = await userResp.json();
      const email = userData.email.toLowerCase();
      const role = ROLES[email];

      if (!role) {
        mostrarError('Este correo no tiene acceso a la aplicación. Contacta con Dani.');
        resetBtn();
        return;
      }

      sessionStorage.setItem('emociona_session', JSON.stringify({
        email,
        name: userData.name,
        picture: userData.picture,
        role,
        access_token: accessToken,
        token_expiry: Date.now() + (response.expires_in * 1000)
      }));

      window.location.href = 'dashboard.html';

    } catch (e) {
      mostrarError('Error al verificar tu cuenta. Inténtalo de nuevo.');
      resetBtn();
    }
  }

  function mostrarError(msg) {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    err.textContent = msg;
    document.getElementById('loading-msg').style.display = 'none';
  }

  function resetBtn() {
    document.getElementById('login-btn').disabled = false;
    document.getElementById('loading-msg').style.display = 'none';
  }
</script>

</body>
</html>
